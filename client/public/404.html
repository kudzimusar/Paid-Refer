<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Refer 2.0</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // Keep /Paid-Refer/ in the path

      var l = window.location;
      var path = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/');
      var query = l.search ? l.search.slice(1) : '';

      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/' + path +
        (query ? '&' + query : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <!-- GitHub Pages will serve this file for any 404 -->
  </body>
</html>
