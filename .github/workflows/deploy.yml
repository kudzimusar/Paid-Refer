# .github/workflows/deploy.yml — auto deploy on push to main

name: Deploy to Cloud Run
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Create Artifact Registry Repo (if missing)
        run: |
          gcloud artifacts repositories create paid-refer \
            --repository-format=docker \
            --location=africa-south1 \
            --description="Docker repository for Paid Refer API" --quiet || true

      - name: Build and push image
        run: |
          gcloud builds submit \
            --tag africa-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/paid-refer/api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy refer-api \
            --image africa-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/paid-refer/api:${{ github.sha }} \
            --region africa-south1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars NODE_ENV=production \
            --min-instances 1 \
            --max-instances 10 \
            --memory 512Mi \
            --cpu 1
